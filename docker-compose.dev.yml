services:
    controller:
        build:
            context: .
            dockerfile: controller.Dockerfile
        image: avisos-controller:latest
        container_name: avisos-controller
        networks:
            avisos-net:
            # proxy-net:
            #     aliases:
            #         - avisos
        ports:
            - "8083:8083"
        env_file:
            - .env.example
        environment:
            - AVISOS_AWS_ENDPOINT=http://avisos-cloud:4566
            - AVISOS_AWS_REGION=us-east-1
            - AVISOS_AWS_S3_BUCKET_NAME=avisos-flagged-images
            - AVISOS_AWS_ACCESS_KEY_ID=test
            - AVISOS_AWS_SECRET_ACCESS_KEY=test
            - AVISOS_AI_RAG_KNOWLEDGE_BASE_DIR=/app/avisos-knowledge
            - SPRING_AI_OLLAMA_BASE_URL=http://host.docker.internal:11434
            - SPRING_DATASOURCE_URL=jdbc:postgresql://avisos-pgvector:5432/avisos_vectors
            - SPRING_DATASOURCE_USERNAME=avisos
            - SPRING_DATASOURCE_PASSWORD=avisos
        volumes:
            - ./avisos-knowledge:/app/avisos-knowledge:ro
            - ./data:/app/data
            - ./logs:/app/logs
        depends_on:
            - mosquitto
            - vision-api
            - localstack
            # - ollama
            - pgvector
        restart: unless-stopped
        extra_hosts:
            - "host.docker.internal:host-gateway"

    mosquitto:
        image: eclipse-mosquitto:latest
        container_name: avisos-broker
        networks:
            - avisos-net
        ports:
            - "1883:1883"
        volumes:
            - ./mosquitto/config:/mosquitto/config
            - ./mosquitto/data:/mosquitto/data
            - ./mosquitto/log:/mosquitto/log

    localstack:
        image: localstack/localstack:3
        container_name: avisos-cloud
        networks:
            - avisos-net
        ports:
            - "4567:4566"
        environment:
            - SERVICES=sns,s3
            - DEFAULT_REGION=us-east-1
            - DOCKER_HOST=unix:///var/run/docker.sock
            - LOCALSTACK_AUTH_TOKEN=
            - LOCALSTACK_API_KEY=
            - LOCALSTACK_SKIP_LICENSE_CHECK=1
        volumes:
            - "./localstack:/var/lib/localstack"
            - "/var/run/docker.sock:/var/run/docker.sock"

    vision-api:
        platform: linux/amd64
        image: codeproject/ai-server
        container_name: avisos-VisionRequest
        networks:
            - avisos-net
        ports:
            - "32168:32168"
        environment:
            - VISION-DETECTION=True

    # // Decided to run Ollama on bare metal for measureable performance gains.
    # ollama:
    #     image: ollama/ollama:latest
    #     container_name: avisos-ollama
    #     networks:
    #         - avisos-net
    #     ports:
    #         - "11434:11434"
    #     volumes:
    #         - ollama-data:/root/.ollama
    #     restart: unless-stopped

    pgvector:
        image: pgvector/pgvector:pg17
        container_name: avisos-pgvector
        networks:
            - avisos-net
        ports:
            - "5433:5432"
        environment:
            - POSTGRES_DB=avisos_vectors
            - POSTGRES_USER=avisos
            - POSTGRES_PASSWORD=avisos
        volumes:
            - pgvector-data:/var/lib/postgresql/data
        restart: unless-stopped

volumes:
    ollama-data:
    pgvector-data:

networks:
    avisos-net:
        driver: bridge
    # proxy-net:
    #     external: true
