services:
  controller:
    build:
      context: .
      dockerfile: controller.Dockerfile
    image: avisos-controller:latest
    container_name: avisos-controller
    networks:
      - avisos-net
    stdin_open: true
    tty: true
    environment:
      - TERM=xterm-256color
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped

  node-01:
    build:
      context: .
      dockerfile: node.Dockerfile
    container_name: avisos-node-01
    networks:
      - avisos-net

  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: avisos-broker
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log

  localstack:
    image: localstack/localstack:3
    container_name: avisos-cloud
    ports:
      - "4566:4566"
    environment:
      - SERVICES=sns
      - DEFAULT_REGION=us-east-1
      - DOCKER_HOST=unix:///var/run/docker.sock
      - LOCALSTACK_AUTH_TOKEN=
      - LOCALSTACK_API_KEY=
      - LOCALSTACK_SKIP_LICENSE_CHECK=1
    volumes:
      - "./localstack:/var/lib/localstack"
      - "/var/run/docker.sock:/var/run/docker.sock"

  vision-api:
    platform: linux/amd64
    image: codeproject/ai-server
    container_name: avisos-VisionRequest
    ports:
      - "32168:32168"
    environment:
      - VISION-DETECTION=True

networks:
  avisos-net:
    driver: bridge