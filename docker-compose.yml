services:
    controller:
        build:
            context: .
            dockerfile: controller.Dockerfile
        image: avisos-controller:latest
        container_name: avisos-controller
        networks:
            avisos-net:
            proxy-net:
                aliases:
                    - avisos
        ports:
            - "8083:8083"
        environment:
            - AVISOS_MQTT_BROKER=${AVISOS_MQTT_BROKER:?Set AVISOS_MQTT_BROKER in .env}
            - AVISOS_MQTT_TOPIC=${AVISOS_MQTT_TOPIC:?Set AVISOS_MQTT_TOPIC in .env}
            - AVISOS_VISION_API_URL=${AVISOS_VISION_API_URL:?Set AVISOS_VISION_API_URL in .env}
            - AVISOS_DATABASE_URL=${AVISOS_DATABASE_URL:?Set AVISOS_DATABASE_URL in .env}
            - DATABASE_ENCRYPTION_KEY=${DATABASE_ENCRYPTION_KEY:?Set DATABASE_ENCRYPTION_KEY in .env}
            - AVISOS_CLI_ENABLED=${AVISOS_CLI_ENABLED:-false}
        volumes:
            - ./data:/app/data
            - ./logs:/app/logs
        depends_on:
            - mosquitto
            - vision-api
        restart: unless-stopped

    mosquitto:
        image: eclipse-mosquitto:latest
        container_name: avisos-broker
        networks:
            - avisos-net
        ports:
            - "1883:1883"
        volumes:
            - ./mosquitto/config:/mosquitto/config
            - ./mosquitto/data:/mosquitto/data
            - ./mosquitto/log:/mosquitto/log

    localstack:
        image: localstack/localstack:3
        container_name: avisos-cloud
        networks:
            - avisos-net
        ports:
            - "4567:4566"
        environment:
            - SERVICES=sns
            - DEFAULT_REGION=us-east-1
            - DOCKER_HOST=unix:///var/run/docker.sock
            - LOCALSTACK_AUTH_TOKEN=
            - LOCALSTACK_API_KEY=
            - LOCALSTACK_SKIP_LICENSE_CHECK=1
        volumes:
            - "./localstack:/var/lib/localstack"
            - "/var/run/docker.sock:/var/run/docker.sock"

    vision-api:
        platform: linux/amd64
        image: codeproject/ai-server
        container_name: avisos-VisionRequest
        networks:
            - avisos-net
        ports:
            - "32168:32168"
        environment:
            - VISION-DETECTION=True

networks:
    avisos-net:
        driver: bridge
    proxy-net:
        external: true
