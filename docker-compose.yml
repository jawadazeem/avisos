services:
    controller:
        build:
            context: .
            dockerfile: controller.Dockerfile
        image: avisos-controller:latest
        container_name: avisos-controller
        networks:
            - avisos-net
        ports:
            - "8083:8083"
        environment:
            - AVISOS_MQTT_BROKER=tcp://mosquitto:1883
            - AVISOS_MQTT_TOPIC=avisos/telemetry
            - AVISOS_VISION_API_URL=http://vision-api:32168/v1/vision/detection
            - AVISOS_DATABASE_URL=jdbc:sqlite:/app/data/avisos.db
            - AVISOS_CLI_ENABLED=false
        volumes:
            - ./data:/app/data
            - ./logs:/app/logs
        depends_on:
            - mosquitto
            - vision-api
        restart: unless-stopped

    mosquitto:
        image: eclipse-mosquitto:latest
        container_name: avisos-broker
        networks:
            - avisos-net
        ports:
            - "1883:1883"
        volumes:
            - ./mosquitto/config:/mosquitto/config
            - ./mosquitto/data:/mosquitto/data
            - ./mosquitto/log:/mosquitto/log

    localstack:
        image: localstack/localstack:3
        container_name: avisos-cloud
        networks:
            - avisos-net
        ports:
            - "4567:4566"
        environment:
            - SERVICES=sns
            - DEFAULT_REGION=us-east-1
            - DOCKER_HOST=unix:///var/run/docker.sock
            - LOCALSTACK_AUTH_TOKEN=
            - LOCALSTACK_API_KEY=
            - LOCALSTACK_SKIP_LICENSE_CHECK=1
        volumes:
            - "./localstack:/var/lib/localstack"
            - "/var/run/docker.sock:/var/run/docker.sock"

    vision-api:
        platform: linux/amd64
        image: codeproject/ai-server
        container_name: avisos-VisionRequest
        networks:
            - avisos-net
        ports:
            - "32168:32168"
        environment:
            - VISION-DETECTION=True

networks:
    avisos-net:
        driver: bridge
