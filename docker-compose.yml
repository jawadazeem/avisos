services:
  avisos-app:
    build: .
    image: avisos-app:latest
    container_name: avisos_core

    stdin_open: true
    tty: true

    environment:
      - TERM=xterm-256color

    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
  mosquitto:
    image: eclipse-mosquitto:latest
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf