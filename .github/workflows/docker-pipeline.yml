name: Prod Deployment

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate example env
        run: |
          test -f .env.example

      - name: Build and set up demo environment
        run: |
          ./scripts/setup-demo-environment.sh
