warning:
  # Unauthorized personnel
  # NOTE: Generic object detectors cannot distinguish an authorized technician
  # from an intruder. Do not alarm on "person" without zone/access context.
  - "crowd"
  - "group of people"
  - "trespasser"
  - "intruder"

  # Concealment and disguise
  - "mask"
  - "balaclava"
  - "hood"
  - "helmet"
  - "face covering"

  # Break-in tools
  - "crowbar"
  - "bolt cutter"
  - "pry bar"
  - "drill"
  - "saw"
  - "hammer"
  - "wire cutter"
  - "lockpick"
  - "angle grinder"

  # Suspicious objects
  - "backpack"
