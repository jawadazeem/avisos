server:
    port: 8083

management:
    endpoints:
        web:
            exposure:
                include: health,info,metrics
        health:
            show-details: always

avisos:
    cli:
        enabled: false
    mqtt:
        controller-client-id: "avisos-controller"
        broker: "tcp://localhost:1883"
        topic: "avisos/alerts"
        connection-timeout: 10
        clean-session: false
        automatic-reconnect: true
    node-service:
        stale-threshold: 60
        min-heartbeat-interval-ms: 2000
    vision:
        api-url: "http://localhost:32168/v1/vision/detection"
        min-confidence: 0.70
        timeout-seconds: 5
    database:
        url: "jdbc:sqlite:avisos.db"
    aws:
        endpoint: "http://localhost:4567"
        region: "us-east-1"
        s3-bucket-name: "avisos-flagged-images"
        access-key-id: "test"
        secret-access-key: "test"
    ai:
        rag:
            knowledge-base-dir: "../avisos-knowledge"
    notification:
        email:
            dry-run: ${AVISOS_EMAIL_DRY_RUN:true}
            from: "${MAIL_USERNAME:jawad.azeem@outlook.com}"

spring:
    mail:
        host: "${MAIL_HOST:smtp.office365.com}"
        port: ${MAIL_PORT:587}
        username: "${MAIL_USERNAME:}"
        password: "${MAIL_PASSWORD:}"
        properties:
            mail.smtp.auth: true
            mail.smtp.starttls.enable: true
            mail.smtp.starttls.required: true
    datasource:
        url: "jdbc:postgresql://avisos-pgvector:5432/avisos_vectors"
        username: "avisos"
        password: "avisos"
        driver-class-name: "org.postgresql.Driver"
    ai:
        ollama:
            base-url: "http://host.docker.internal:11434"
            chat:
                model: "llama3.2"
            embedding:
                model: "nomic-embed-text"
            init:
                pull-model-strategy: "WHEN_MISSING"
        vectorstore:
            pgvector:
                initialize-schema: "true"
                index-type: "HNSW"
                dimensions: "768"
