server:
    port: 8083

management:
    endpoints:
        web:
            exposure:
                include: health,info,metrics

avisos:
    cli:
        enabled: false
    mqtt:
        controller-client-id: "avisos-controller"
        broker: "tcp://localhost:1883"
        topic: "avisos/alerts"
        connection-timeout: 10
        clean-session: false
        automatic-reconnect: true
    node-service:
        stale-threshold: 60
        min-heartbeat-interval-ms: 2000
    vision:
        api-url: "http://localhost:32168/v1/vision/detection"
        min-confidence: 0.70
        timeout-seconds: 5
    database:
        url: "jdbc:sqlite:avisos.db"
    aws:
        endpoint: "http://localhost:4567"
        region: "us-east-1"
        s3-bucket-name: "avisos-flagged-images"
        access-key-id: "test"
        secret-access-key: "test"
    ai:
        ollama-base-url: "http://localhost:11434"
        chat-model: "llama3.2:3b"
        embedding-model: "nomic-embed-text"
        knowledge-base-path: "../avisos-knowledge"

spring:
    ai:
        ollama:
            base-url: ${avisos.ai.ollama-base-url}
            chat:
                model: ${avisos.ai.chat-model}
            embedding:
                model: ${avisos.ai.embedding-model}
